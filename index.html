<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craft Bound: Infinite Sandbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hud">
        <div class="hud-box">
            <span class="hud-label">CURRENT MODE</span>
            <span id="mode-display" class="mode-badge badge-mine">⛏️ MINING</span>
        </div>
        <div class="hud-box" style="text-align: center;">
            <span class="hud-label">WORLD SAVED</span>
            <span id="save-status">● AUTO</span>
        </div>
        <div class="hud-box" style="text-align: right;">
            <span class="hud-label">BLOCKS MINED</span>
            <span id="stats-mined">0</span>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="sandboxCanvas" width="360" height="540"></canvas>
        
        <div class="inventory-hotbar">
            <div class="slot active-slot" data-block="1" style="background-color: #795548;">🟫<span class="slot-lbl">Dirt</span></div>
            <div class="slot" data-block="2" style="background-color: #4caf50;">🟩<span class="slot-lbl">Grass</span></div>
            <div class="slot" data-block="3" style="background-color: #757575;">🪨<span class="slot-lbl">Stone</span></div>
            <div class="slot" data-block="4" style="background-color: #ffb300;">🪙<span class="slot-lbl">Gold</span></div>
            <div class="slot" data-block="5" style="background-color: #00e5ff;">💎<span class="slot-lbl">Gem</span></div>
        </div>
    </div>

    <p class="controls-hint"><b>Desktop:</b> Click to Mine/Place. Press <b>SPACEBAR</b> to toggle modes.<br><b>Mobile:</b> Tap slots to choose blocks. Tap map directly to interact.</p>

    <script src="game.js"></script>
</body>
</html>
