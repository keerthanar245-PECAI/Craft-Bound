<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Craft Bound v2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>CRAFT <span>BOUND</span></h1>
  <div id="gameWrapper">
    <canvas id="cb" width="960" height="560"></canvas>
    <div id="score-flash"></div>
  </div>
  <div id="toolbar">
    <span>BUILD:</span>
  </div>
  <div id="controls">
    <span><b>A / D</b> or <b>← →</b> scroll</span>
    <span><b>Space</b> mine / build</span>
    <span><b>1–7</b> select block</span>
    <span><b>Click</b> action</span>
    <span><b>M</b> music on/off</span>
  </div>
  <script src="game.js"></script>
</body>
</html>
